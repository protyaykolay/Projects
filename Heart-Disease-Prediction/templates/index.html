<!DOCTYPE html>
<html>

<head>

<title>Heart Disease Prediction</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(to right,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:700px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#1e3c72;
margin-bottom:25px;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
border-color:#2a5298;
outline:none;
}

button{
grid-column:span 2;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16325c;
}

.result{
text-align:center;
margin-top:20px;
font-size:20px;
color:#2a5298;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Heart Disease Prediction System</h2>

<form action="/predict" method="post">

<input type="number" name="age" placeholder="Age" required>

<input type="number" name="sex" placeholder="Sex (0=Female,1=Male)" required>

<input type="number" name="cp" placeholder="Chest Pain Type (0-3)" required>

<input type="number" name="trestbps" placeholder="Resting Blood Pressure" required>

<input type="number" name="chol" placeholder="Cholesterol" required>

<input type="number" name="fbs" placeholder="Fasting Blood Sugar (0/1)" required>

<input type="number" name="restecg" placeholder="Rest ECG (0-2)" required>

<input type="number" name="thalach" placeholder="Max Heart Rate" required>

<input type="number" name="exang" placeholder="Exercise Angina (0/1)" required>

<input type="number" step="any" name="oldpeak" placeholder="Old Peak" required>

<input type="number" name="slope" placeholder="Slope (0-2)" required>

<input type="number" name="ca" placeholder="Major Vessels (0-3)" required>

<input type="number" name="thal" placeholder="Thal (1-3)" required>

<button type="submit">Predict Heart Disease</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>

</html>
