<!DOCTYPE html>
<html>

<head>
<title>Heart Disease Prediction</title>
</head>

<body>

<h2>Heart Disease Prediction System</h2>

<form action="/predict" method="post">

<input type="number" name="age" placeholder="Age" required><br><br>

<input type="number" name="sex" placeholder="Sex (0=Female,1=Male)" required><br><br>

<input type="number" name="cp" placeholder="Chest Pain Type (0-3)" required><br><br>

<input type="number" name="trestbps" placeholder="Resting Blood Pressure" required><br><br>

<input type="number" name="chol" placeholder="Cholesterol" required><br><br>

<input type="number" name="fbs" placeholder="Fasting Blood Sugar (0/1)" required><br><br>

<input type="number" name="restecg" placeholder="Rest ECG (0-2)" required><br><br>

<input type="number" name="thalach" placeholder="Max Heart Rate" required><br><br>

<input type="number" name="exang" placeholder="Exercise Angina (0/1)" required><br><br>

<input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required><br><br>

<input type="number" name="slope" placeholder="Slope (0-2)" required><br><br>

<input type="number" name="ca" placeholder="Number of Major Vessels (0-3)" required><br><br>

<input type="number" name="thal" placeholder="Thal (1-3)" required><br><br>

<button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>

</html>
